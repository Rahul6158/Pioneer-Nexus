<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/Images/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <title>Konfig Insights Engine</title>
  <style>
    /* Hide the google translate banner and other elements */
    .skiptranslate, .goog-te-banner-frame, #goog-gt-tt, .goog-te-balloon-frame, .goog-tooltip {
      display: none !important;
    }
    body {
      top: 0 !important;
    }
    #google_translate_element {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
    }
    .goog-te-combo {
      visibility: hidden;
      position: absolute;
    }
  </style>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      try {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false
        }, 'google_translate_element');
      } catch (err) {
        console.error('Google Translate Init Error:', err);
      }
    }
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>

<body>
  <div id="root"></div>
  <div id="google_translate_element"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
